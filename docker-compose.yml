services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: invoicescan
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d invoicescan"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Observability (SigNoz) ─────────────────────────────────────────────
  # Run only with: docker compose --profile observability up
  # UI available at: http://localhost:3301
  # OTLP HTTP endpoint: http://localhost:4318
  #
  # Set in .env:
  #   OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318
  #   OTEL_SERVICE_NAME=invoice-flow-backend
  signoz:
    profiles: [observability]
    image: signoz/signoz:latest
    container_name: signoz
    ports:
      - "3301:3301"   # SigNoz UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    environment:
      - STORAGE=clickhouse
    volumes:
      - signozdata:/var/lib/signoz

volumes:
  pgdata:
  redisdata:
  signozdata:
